name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: odoo-knowledge-rs-linux-x86_64.tar.gz
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build release binary
        run: cargo build --release -p odoo-knowledge-cli --target ${{ matrix.target }}
      - name: Package artifact
        run: |
          mkdir -p dist/odoo-knowledge-rs
          cp target/${{ matrix.target }}/release/odoo-knowledge dist/odoo-knowledge-rs/
          cp README.md LICENSE dist/odoo-knowledge-rs/
          cp -r config examples docs dist/odoo-knowledge-rs/
          tar -C dist -czf ${{ matrix.archive }} odoo-knowledge-rs
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}
      - name: Publish GitHub release artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive }}
